<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pounce</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <meta name="description" content="Pounce — your personal study companion" />
    <meta name="theme-color" content="#fefcf9" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Framework7 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@8.3.4/css/framework7-bundle.min.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body class="ios">
    <div id="root"></div>

    <script src="https://unpkg.com/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
      // Inline fetch and eval of study-app.jsx
      fetch('./study-app.jsx')
        .then(r => r.text())
        .then(code => {
          const transformed = Babel.transform(code, { presets: [['react', { runtime: 'classic' }]] }).code;
          // eslint-disable-next-line no-new-func
          new Function('React', 'ReactDOM', transformed + '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));')(React, ReactDOM);
        })
        .catch(e => console.error('Failed to load app:', e));
    </script>
  </body>
</html>
